# SurvivalPirate_curriculum.yaml
#
# Uses ONE curriculum parameter: "difficulty"
# In Unity you must read:
#   float d = Academy.Instance.EnvironmentParameters.GetWithDefault("difficulty", 0f);
# and map it to your centralized config values (spawn chance, HP, damage, target wood, etc.)
#
# Training intentionally long.

env_settings:
  env_path: "C:\\Unity Folder\\Survival Ai\\Builds\\Survival Ai.exe"
  num_envs: 4
  seed: -1

engine_settings:
  time_scale: 15
  target_frame_rate: -1
  no_graphics: true

torch_settings:
  device: cpu

behaviors:
  Pirate:   # Must match Behavior Name in Unity ("Pirate")
    trainer_type: ppo

    hyperparameters:
      batch_size: 2048
      buffer_size: 40960
      learning_rate: 3.0e-4
      learning_rate_schedule: linear
      beta: 3.0e-3 # entropy = a quel point il explore on la augmenter pour qu'il explore plus
      beta_schedule: linear
      epsilon: 0.2
      epsilon_schedule: constant
      lambd: 0.95
      num_epoch: 3
      shared_critic: false

    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    time_horizon: 1500 # a quel point il attend avant de compute les rewars, puisque c'est augmenter c'est mieux car il y a des enemy alors plus long avant de get reward
    summary_freq: 20000
    keep_checkpoints: 10
    checkpoint_interval: 1000000

    # Really long run:
    max_steps: 80000000

environment_parameters:
  difficulty:
    curriculum:
      - name: L0_bootstrap_navigation
        completion_criteria:
          measure: reward
          behavior: Pirate
          signal_smoothing: true
          min_lesson_length: 600
          threshold: 0.15
          require_reset: true
        value: 0.0

      - name: L1_small_goal_wood3
        completion_criteria:
          measure: reward
          behavior: Pirate
          signal_smoothing: true
          min_lesson_length: 800
          threshold: 0.4
          require_reset: true
        value: 1.0

      - name: L2_wood5
        completion_criteria:
          measure: reward
          behavior: Pirate
          signal_smoothing: true
          min_lesson_length: 1000
          threshold: 0.48
          require_reset: true
        value: 2.0

      - name: L3_wood8
        completion_criteria:
          measure: reward
          behavior: Pirate
          signal_smoothing: true
          min_lesson_length: 1500
          threshold: 0.53
          require_reset: true
        value: 3.0

      - name: L4_wood10_no_enemy
        completion_criteria:
          measure: reward
          behavior: Pirate
          signal_smoothing: true
          min_lesson_length: 1800
          threshold: 0.58 
          require_reset: true
        value: 4.0

      - name: L5_intro_enemy_very_easy
        completion_criteria:
          measure: reward
          behavior: Pirate
          signal_smoothing: true
          min_lesson_length: 2200
          threshold: 0.38 # drop car premiere fois avec un ennemi
          require_reset: true
        value: 5.0

      - name: L6_enemy_low_density
        completion_criteria:
          measure: reward
          behavior: Pirate
          signal_smoothing: true
          min_lesson_length: 2600
          threshold: 0.44
          require_reset: true
        value: 6.0

      # BRIDGE: learnable step between 6 and 7
      - name: L6p5_bridge
        completion_criteria:
          measure: reward
          behavior: Pirate
          signal_smoothing: true
          min_lesson_length: 3000
          threshold: 0.46
          require_reset: true
        value:
          sampler_type: uniform
          sampler_parameters:
            min_value: 5.5
            max_value: 6.5

      # MIXTURE: keep some easier episodes so farming doesn't die
      - name: L7_enemy_medium_density_mixed
        completion_criteria:
          measure: reward
          behavior: Pirate
          signal_smoothing: true
          min_lesson_length: 3400
          threshold: 0.46
          require_reset: true
        value:
          sampler_type: uniform
          sampler_parameters:
            min_value: 5.8
            max_value: 7.0

      - name: L8_enemy_stronger_mixed
        completion_criteria:
          measure: reward
          behavior: Pirate
          signal_smoothing: true
          min_lesson_length: 4200
          threshold: 0.40
          require_reset: true
        value:
          sampler_type: uniform
          sampler_parameters:
            min_value: 6.5
            max_value: 8.0

      - name: L9_near_final_mixed
        completion_criteria:
          measure: reward
          behavior: Pirate
          signal_smoothing: true
          min_lesson_length: 5200
          threshold: 0.35
          require_reset: true
        value:
          sampler_type: uniform
          sampler_parameters:
            min_value: 7.5
            max_value: 9.0

      - name: L10_final_with_variation
        value:
          sampler_type: uniform
          sampler_parameters:
            min_value: 8.5
            max_value: 10.0